name: Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # =========================
      # Linux dependencies
      # =========================
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev

      # =========================
      # Configure
      # =========================
      - name: Configure
        run: cmake -S . -B build

      # =========================
      # Build
      # =========================
      - name: Build
        run: cmake --build build
