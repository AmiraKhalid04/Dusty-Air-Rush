name: Auto Assign Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto assign review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewMap = JSON.parse(fs.readFileSync('.github/review-map.json', 'utf8'));

            const author = context.payload.pull_request.user.login; 
            let reviewers = reviewMap[author];

            if (!reviewers) {
            console.log(`No reviewer found for ${author} in review map`);
             return;
            }
             // Ensure reviewers is always an array
            if (!Array.isArray(reviewers)) {
            reviewers = [reviewers];
            }

            try {
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: reviewers
            });
            console.log(`Assigned reviewers ${reviewers.join(', ')} for PR #${context.issue.number}`);
            } catch (error) {
            console.error(`Failed to assign reviewer: ${error.message}`);
            }
