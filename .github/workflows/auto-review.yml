name: Auto Assign Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto assign review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewMap = JSON.parse(fs.readFileSync('.github/review-map.json', 'utf8'));

            const author = context.payload.pull_request.user.login;
            const reviewer = reviewMap[author];

            if (!reviewer) {
              console.log(`No reviewer found for ${author} in review map`);
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: [reviewer]
              });
              console.log(`Assigned ${reviewer} as reviewer for PR #${context.issue.number}`);
            } catch (error) {
              console.error(`Failed to assign reviewer: ${error.message}`);
            }
